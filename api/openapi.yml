openapi: 3.0.3
info:
  title: Change Quality Agent API
  version: 0.1.0
  description: 'API contract for SOP quality runs, run history, and generic run observation.
    SOP fetching is mocked in v1.

    '
servers:
- url: /
tags:
- name: auth
  description: Cookie-backed user authentication APIs for local development.
- name: sop
  description: SOP entry points and SOP-scoped run history.
- name: runs
  description: Generic run observation APIs.
- name: mcp
  description: MCP server configuration and runtime management APIs.
- name: agents
  description: ReAct agent definitions, versions, and test runs.
- name: llm-providers
  description: Stored LangChain chat model provider configuration.
security:
- CookieAuth: []
paths:
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Get the current authenticated user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/dev-login:
    post:
      tags:
      - auth
      summary: Log in as a seeded development user
      operationId: devLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevLoginRequest'
      responses:
        '200':
          description: Development user session was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '403':
          description: Development login is disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested development user was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/logout:
    post:
      tags:
      - auth
      summary: Clear the development session cookie
      operationId: logout
      security: []
      responses:
        '204':
          description: Session cookie cleared.
  /api/sop/environments:
    get:
      tags:
      - sop
      summary: List configured SOP environments
      operationId: listSopEnvironments
      responses:
        '200':
          description: Configured public environments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnvironmentPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/sop/{sop_id}:
    get:
      tags:
      - sop
      summary: Preview a mocked SOP snapshot
      operationId: getSopPreview
      parameters:
      - $ref: '#/components/parameters/SopId'
      - $ref: '#/components/parameters/EnvironmentKey'
      responses:
        '200':
          description: Mocked SOP snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/sop/{sop_id}/runs:
    post:
      tags:
      - sop
      summary: Start a quality run for a mocked SOP snapshot
      operationId: startSopRun
      parameters:
      - $ref: '#/components/parameters/SopId'
      - $ref: '#/components/parameters/EnvironmentKey'
      responses:
        '202':
          description: Run accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: An active run already exists for this SOP and environment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveRunConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags:
      - sop
      summary: List SOP run history
      operationId: listSopRuns
      parameters:
      - $ref: '#/components/parameters/SopId'
      - $ref: '#/components/parameters/EnvironmentKey'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: SOP run history, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/sop/recent/runs:
    get:
      tags:
      - sop
      summary: List recent SOP runs for one environment
      operationId: listRecentSopRuns
      parameters:
      - $ref: '#/components/parameters/EnvironmentKey'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Recent SOP runs for the environment, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{run_id}:
    get:
      tags:
      - runs
      summary: Get generic run details
      description: 'Generic run details intentionally do not expose SOP-specific fields
        such as env_key at the top level.

        '
      operationId: getRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: debug
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Generic run details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{run_id}/events:
    get:
      tags:
      - runs
      summary: Stream persisted run events
      description: 'Server-Sent Events stream. The server first replays persisted
        events with sequence greater than after, then polls persisted events until
        it sends terminal done or error.

        '
      operationId: streamRunEvents
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: after
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: 'SSE frames using id as sequence, event as event type, and
            data as a JSON RunEvent envelope.

            '
          content:
            text/event-stream:
              schema:
                type: string
                example: 'id: 3

                  event: done

                  data: {"run_id":"2f4f9c1c-5f97-4c9c-89d2-9e7e3b6a1a11","sequence":3,"type":"done","node":null,"thread_id":"thread-id","checkpoint_id":null,"task_id":null,"payload":{"status":"done"},"created_at":"2026-05-25T00:00:00Z"}

                  '
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers:
    get:
      tags:
      - mcp
      summary: List MCP servers
      operationId: listMcpServers
      security:
      - CookieAuth: []
      responses:
        '200':
          description: MCP servers with redacted config values.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/McpServerSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
      - mcp
      summary: Create an MCP server configuration
      operationId: createMcpServer
      security:
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerCreate'
      responses:
        '201':
          description: Created MCP server with redacted config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDetail'
        '409':
          description: An MCP server with this name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}:
    get:
      tags:
      - mcp
      summary: Get MCP server details
      operationId: getMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: MCP server details and latest tool snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - mcp
      summary: Update an MCP server configuration
      operationId: updateMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerUpdate'
      responses:
        '200':
          description: Updated MCP server with redacted config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Running MCP servers must be stopped before config updates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - mcp
      summary: Delete an MCP server configuration
      operationId: deleteMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '204':
          description: MCP server deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/start:
    post:
      tags:
      - mcp
      summary: Start an MCP server
      operationId: startMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after start attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/stop:
    post:
      tags:
      - mcp
      summary: Stop an MCP server
      operationId: stopMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after stop attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/restart:
    post:
      tags:
      - mcp
      summary: Restart an MCP server
      operationId: restartMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after restart attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/check:
    post:
      tags:
      - mcp
      summary: Check an MCP server and refresh tools
      operationId: checkMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after check attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/llm-providers:
    get:
      tags:
      - llm-providers
      summary: List LLM providers
      operationId: listLlmProviders
      responses:
        '200':
          description: LLM provider summaries with masked secret-like config values.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LlmProviderSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - llm-providers
      summary: Create an LLM provider
      operationId: createLlmProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderCreate'
      responses:
        '201':
          description: Created LLM provider with masked secret-like config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/llm-providers/{provider_id}:
    get:
      tags:
      - llm-providers
      summary: Get an LLM provider
      operationId: getLlmProvider
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      responses:
        '200':
          description: LLM provider detail with masked secret-like config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderDetail'
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - llm-providers
      summary: Update an LLM provider
      operationId: updateLlmProvider
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderUpdate'
      responses:
        '200':
          description: Updated LLM provider with masked secret-like config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderDetail'
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - llm-providers
      summary: Delete an LLM provider
      operationId: deleteLlmProvider
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      responses:
        '204':
          description: LLM provider deleted.
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/llm-providers/{provider_id}/test:
    post:
      tags:
      - llm-providers
      summary: Test an LLM provider model
      operationId: testLlmProviderModel
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderModelTestRequest'
      responses:
        '200':
          description: Provider model responded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderModelTestResponse'
        '400':
          description: Requested model is not configured for this provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Provider model connectivity test failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderModelTestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents:
    get:
      tags:
      - agents
      summary: List ReAct agents
      operationId: listAgents
      parameters:
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Agent summaries, newest first according to repository ordering.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - agents
      summary: Create a ReAct agent draft
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreate'
      responses:
        '201':
          description: Agent created with its initial draft configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}:
    get:
      tags:
      - agents
      summary: Get a ReAct agent
      operationId: getAgent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent detail including the current draft, when present.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - agents
      summary: Delete a ReAct agent
      operationId: deleteAgent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '204':
          description: Agent deleted.
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/draft:
    patch:
      tags:
      - agents
      summary: Update a ReAct agent draft
      operationId: updateAgentDraft
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentDraftUpdate'
      responses:
        '200':
          description: Updated agent detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/publish:
    post:
      tags:
      - agents
      summary: Publish a ReAct agent draft
      operationId: publishAgent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '201':
          description: Published agent version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionDetail'
        '400':
          description: Agent draft is invalid and cannot be published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/versions:
    get:
      tags:
      - agents
      summary: List published ReAct agent versions
      operationId: listAgentVersions
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Published versions for the agent.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentVersionSummary'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/versions/{version_number}:
    get:
      tags:
      - agents
      summary: Get a published ReAct agent version
      operationId: getAgentVersion
      parameters:
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/AgentVersionNumber'
      responses:
        '200':
          description: Published agent version detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionDetail'
        '404':
          description: Agent or version not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/test-runs:
    post:
      tags:
      - agents
      summary: Start a ReAct agent test run
      operationId: startAgentTestRun
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTestRunCreate'
      responses:
        '202':
          description: Agent test run accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStartResponse'
        '400':
          description: Agent is disabled or requested agent version was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: cqa_user
  parameters:
    SopId:
      name: sop_id
      in: path
      required: true
      schema:
        type: string
      example: release-checklist
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    McpServerId:
      name: server_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentKey:
      name: env
      in: query
      required: true
      schema:
        type: string
      example: dev
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentVersionNumber:
      name: version_number
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    LlmProviderId:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is required or the session cookie is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Unknown environment, SOP, or run.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream dependency or lifecycle failure before completion.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user does not have admin access.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: MCP runtime is not configured or not enabled.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    UserPublic:
      type: object
      required:
      - id
      - account
      - is_admin
      - meta
      properties:
        id:
          type: string
          format: uuid
        account:
          type: string
          example: common
        is_admin:
          type: boolean
        meta:
          type: object
          additionalProperties: true
          default: {}
    DevLoginRequest:
      type: object
      required:
      - account
      properties:
        account:
          type: string
          example: common
    EnvironmentPublic:
      type: object
      required:
      - key
      - name_zh
      - name_en
      properties:
        key:
          type: string
          example: dev
        name_zh:
          type: string
          example: "\u5F00\u53D1"
        name_en:
          type: string
          example: Development
    SopSnapshot:
      type: object
      required:
      - sop_id
      - env_key
      - payload
      properties:
        sop_id:
          type: string
        env_key:
          type: string
        source_version:
          type: string
          nullable: true
          example: mock-v1
        updated_at:
          type: string
          format: date-time
          nullable: true
        payload:
          type: object
          additionalProperties: true
    RunStatus:
      type: string
      enum:
      - pending
      - running
      - success
      - error
      - timeout
      - interrupted
    RunStartResponse:
      type: object
      required:
      - run_id
      - status
      - status_url
      - events_url
      properties:
        run_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/RunStatus'
        status_url:
          type: string
        events_url:
          type: string
    ActiveRunConflict:
      type: object
      required:
      - message
      - active_run_id
      - status_url
      - events_url
      properties:
        message:
          type: string
        active_run_id:
          type: string
          format: uuid
        status_url:
          type: string
        events_url:
          type: string
    RunSummary:
      type: object
      required:
      - run_id
      - subject_type
      - subject_id
      - status
      - completed_nodes
      - latest_sequence
      properties:
        run_id:
          type: string
          format: uuid
        subject_type:
          type: string
          example: sop
        subject_id:
          type: string
          example: release-checklist
        status:
          $ref: '#/components/schemas/RunStatus'
        current_node:
          type: string
          nullable: true
        completed_nodes:
          type: array
          items:
            type: string
        latest_sequence:
          type: integer
          minimum: 0
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        result_status:
          type: string
          nullable: true
        error_summary:
          type: string
          nullable: true
    RunDebug:
      type: object
      required:
      - thread_id
      properties:
        thread_id:
          type: string
        current_checkpoint_id:
          type: string
          nullable: true
        langgraph_state_snapshot:
          type: object
          nullable: true
          additionalProperties: true
        raw_graph_output:
          type: object
          nullable: true
          additionalProperties: true
        raw_last_event:
          allOf:
          - $ref: '#/components/schemas/RunEvent'
          nullable: true
    RunDetail:
      allOf:
      - $ref: '#/components/schemas/RunSummary'
      - type: object
        required:
        - debug
        properties:
          debug:
            allOf:
            - $ref: '#/components/schemas/RunDebug'
            nullable: true
    RunEventType:
      type: string
      enum:
      - tasks
      - messages
      - updates
      - custom
      - checkpoints
      - error
      - done
    RunEvent:
      type: object
      required:
      - run_id
      - sequence
      - type
      - thread_id
      - payload
      - created_at
      properties:
        run_id:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 1
        type:
          $ref: '#/components/schemas/RunEventType'
        node:
          type: string
          nullable: true
        thread_id:
          type: string
        checkpoint_id:
          type: string
          nullable: true
        task_id:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    McpTransport:
      type: string
      enum:
      - stdio
      - http
    McpDesiredState:
      type: string
      enum:
      - running
      - stopped
    McpRuntimeStatus:
      type: string
      enum:
      - unknown
      - starting
      - running
      - stopping
      - stopped
      - error
    McpServerCreate:
      type: object
      required:
      - name
      - transport
      properties:
        name:
          type: string
          example: filesystem
        transport:
          $ref: '#/components/schemas/McpTransport'
        command:
          type: string
          nullable: true
          example: uvx
        args:
          type: array
          items:
            type: string
          default: []
          example:
          - mcp-server-filesystem
        env:
          type: object
          additionalProperties:
            type: string
          default: {}
          example:
            TOKEN: secret
        url:
          type: string
          nullable: true
          example: https://example.com/mcp
        headers:
          type: object
          additionalProperties:
            type: string
          default: {}
        enabled:
          type: boolean
          default: false
        desired_state:
          allOf:
          - $ref: '#/components/schemas/McpDesiredState'
          default: stopped
    McpServerUpdate:
      type: object
      properties:
        name:
          type: string
        command:
          type: string
          nullable: true
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        url:
          type: string
          nullable: true
        headers:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
        desired_state:
          $ref: '#/components/schemas/McpDesiredState'
    McpServerTool:
      type: object
      required:
      - name
      - input_schema
      properties:
        name:
          type: string
          example: search
        description:
          type: string
          nullable: true
        input_schema:
          type: object
          additionalProperties: true
          default: {}
        discovered_at:
          type: string
          format: date-time
          nullable: true
    McpServerSummary:
      type: object
      required:
      - id
      - name
      - transport
      - args
      - env
      - headers
      - enabled
      - desired_state
      - runtime_status
      - tool_count
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        transport:
          $ref: '#/components/schemas/McpTransport'
        command:
          type: string
          nullable: true
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
          example:
            TOKEN: '********'
        url:
          type: string
          nullable: true
        headers:
          type: object
          additionalProperties:
            type: string
          example:
            Authorization: '********'
        enabled:
          type: boolean
        desired_state:
          $ref: '#/components/schemas/McpDesiredState'
        runtime_status:
          $ref: '#/components/schemas/McpRuntimeStatus'
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true
        tool_count:
          type: integer
          minimum: 0
    McpServerDetail:
      allOf:
      - $ref: '#/components/schemas/McpServerSummary'
      - type: object
        required:
        - tools
        properties:
          tools:
            type: array
            items:
              $ref: '#/components/schemas/McpServerTool'
    McpLifecycleResponse:
      type: object
      required:
      - server_id
      - desired_state
      - runtime_status
      - tool_count
      properties:
        server_id:
          type: string
          format: uuid
        desired_state:
          $ref: '#/components/schemas/McpDesiredState'
        runtime_status:
          $ref: '#/components/schemas/McpRuntimeStatus'
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true
        tool_count:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required:
      - detail
      properties:
        detail:
          type: string
    ValidationErrorResponse:
      type: object
      required:
      - detail
      properties:
        detail:
          type: array
          items:
            type: object
            additionalProperties: true
    LlmProviderCreate:
      type: object
      required:
      - display_name
      - provider_type
      properties:
        display_name:
          type: string
          example: OpenAI Main
        description:
          type: string
          nullable: true
        provider_type:
          type: string
          enum:
          - openai
          - anthropic
          - azure_openai
          - azure_ai
          - google_vertexai
          - google_genai
          - anthropic_bedrock
          - bedrock
          - bedrock_converse
          - cohere
          - fireworks
          - together
          - mistralai
          - huggingface
          - groq
          - ollama
          - google_anthropic_vertex
          - deepseek
          - ibm
          - nvidia
          - xai
          - openrouter
          - perplexity
          - upstage
          - baseten
          - litellm
          example: openai
        base_url:
          type: string
          nullable: true
          example: https://api.openai.com/v1
        api_key:
          type: string
          nullable: true
          writeOnly: true
        default_headers:
          type: object
          additionalProperties:
            type: string
        default_query:
          type: object
          additionalProperties:
            type: string
        models:
          type: array
          items:
            type: string
          default: []
          description: Model names this provider can serve.
        enabled:
          type: boolean
          default: true
    LlmProviderUpdate:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        provider_type:
          type: string
          enum:
          - openai
          - anthropic
          - azure_openai
          - azure_ai
          - google_vertexai
          - google_genai
          - anthropic_bedrock
          - bedrock
          - bedrock_converse
          - cohere
          - fireworks
          - together
          - mistralai
          - huggingface
          - groq
          - ollama
          - google_anthropic_vertex
          - deepseek
          - ibm
          - nvidia
          - xai
          - openrouter
          - perplexity
          - upstage
          - baseten
          - litellm
          nullable: true
        base_url:
          type: string
          nullable: true
        api_key:
          type: string
          nullable: true
          writeOnly: true
          description: Omit to preserve the current API key. Send null to clear it.
        default_headers:
          type: object
          nullable: true
          additionalProperties:
            type: string
        default_query:
          type: object
          nullable: true
          additionalProperties:
            type: string
        models:
          type: array
          nullable: true
          items:
            type: string
          description: Model names this provider can serve.
        enabled:
          type: boolean
          nullable: true
    LlmProviderSummary:
      type: object
      required:
      - id
      - display_name
      - provider_type
      - default_headers
      - default_query
      - models
      - enabled
      - created_at
      - updated_at
      - api_key_configured
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
          example: OpenAI Main
        description:
          type: string
          nullable: true
        provider_type:
          type: string
          example: openai
        base_url:
          type: string
          nullable: true
          example: https://api.openai.com/v1
        default_headers:
          type: object
          additionalProperties:
            type: string
          description: Secret-like keys are masked in responses.
        default_query:
          type: object
          additionalProperties:
            type: string
          description: Secret-like keys are masked in responses.
        models:
          type: array
          items:
            type: string
          description: Model names this provider can serve.
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        api_key_configured:
          type: boolean
    LlmProviderDetail:
      type: object
      allOf:
      - $ref: '#/components/schemas/LlmProviderSummary'
      properties: {}
    LlmProviderModelTestRequest:
      type: object
      required:
      - model
      properties:
        model:
          type: string
          minLength: 1
    LlmProviderModelTestResponse:
      type: object
      required:
      - status
      - latency_ms
      properties:
        status:
          type: string
          enum:
          - ok
          - failed
        latency_ms:
          type: number
          format: float
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        request:
          type: object
          additionalProperties: true
          nullable: true
        response:
          type: object
          additionalProperties: true
          nullable: true
    AgentDraftConfig:
      type: object
      required:
      - system_prompt
      - model
      properties:
        system_prompt:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1
        provider_id:
          type: string
          format: uuid
          nullable: true
          description: Stored provider id. When set, model must be a bare model name without a provider prefix.
        model_config:
          type: object
          additionalProperties: true
        tool_allowlist:
          type: array
          items:
            type: string
        mcp_server_ids:
          type: array
          items:
            type: string
    AgentCreate:
      type: object
      required:
      - display_name
      - draft
      properties:
        display_name:
          type: string
          minLength: 1
          example: Release Reviewer
        description:
          type: string
          nullable: true
          example: Checks release quality.
        draft:
          $ref: '#/components/schemas/AgentDraftConfig'
    AgentDraftUpdate:
      type: object
      properties:
        display_name:
          type: string
          minLength: 1
          nullable: true
          example: Release Reviewer
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
          nullable: true
        draft:
          allOf:
          - $ref: '#/components/schemas/AgentDraftConfig'
          nullable: true
    AgentVersionSummary:
      type: object
      required:
      - id
      - version_number
      - model
      - published_at
      properties:
        id:
          type: string
          format: uuid
        version_number:
          type: integer
          minimum: 1
        model:
          type: string
          example: codeagent:codeagent-v4-pro
        provider_id:
          type: string
          format: uuid
          nullable: true
        published_at:
          type: string
          format: date-time
    AgentSummary:
      type: object
      required:
      - id
      - display_name
      - enabled
      - has_draft
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
          example: Release Reviewer
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        has_draft:
          type: boolean
        latest_version:
          allOf:
          - $ref: '#/components/schemas/AgentVersionSummary'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AgentDetail:
      type: object
      required:
      - id
      - display_name
      - enabled
      - has_draft
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
          example: Release Reviewer
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        has_draft:
          type: boolean
        latest_version:
          allOf:
          - $ref: '#/components/schemas/AgentVersionSummary'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        draft:
          allOf:
          - $ref: '#/components/schemas/AgentDraftConfig'
          nullable: true
    AgentVersionDetail:
      type: object
      required:
      - id
      - version_number
      - model
      - published_at
      - agent_id
      - system_prompt
      properties:
        id:
          type: string
          format: uuid
        version_number:
          type: integer
          minimum: 1
        model:
          type: string
          example: codeagent:codeagent-v4-pro
        provider_id:
          type: string
          format: uuid
          nullable: true
        published_at:
          type: string
          format: date-time
        agent_id:
          type: string
          format: uuid
        system_prompt:
          type: string
        model_config:
          type: object
          additionalProperties: true
        tool_allowlist:
          type: array
          items:
            type: string
        mcp_server_ids:
          type: array
          items:
            type: string
        published_by:
          type: string
          nullable: true
    AgentMessage:
      type: object
      required:
      - role
      - content
      properties:
        role:
          type: string
          pattern: ^(user|assistant|system)$
          example: user
        content:
          type: string
          minLength: 1
          example: Can this deploy?
    AgentTestRunCreate:
      type: object
      required:
      - messages
      properties:
        version_id:
          type: string
          format: uuid
          nullable: true
        version_number:
          type: integer
          minimum: 1
          nullable: true
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AgentMessage'
