openapi: 3.0.3
info:
  title: Change Quality Agent API
  version: 0.1.0
  description: 'API contract for SOP quality checks backed by LangGraph checkpoints,
    SOP previewing, agent definitions, MCP runtime management, and auth. SOP fetching
    is mocked in v1.

    '
servers:
- url: /
tags:
- name: auth
  description: Cookie-backed user authentication APIs for local development.
- name: sop
  description: SOP preview and environment APIs.
- name: sop-quality-checks
  description: SOP quality check lifecycle, history, events, and SSE streams.
- name: sessions
  description: Generic conversation/session transcripts shared by agent workflows.
- name: mcp
  description: MCP server configuration and runtime management APIs.
- name: agents
  description: Agent definitions and published versions.
- name: llm-providers
  description: Stored LangChain chat model provider configuration.
security:
- CookieAuth: []
paths:
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Get the current authenticated user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/dev-login:
    post:
      tags:
      - auth
      summary: Log in as a seeded development user
      operationId: devLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevLoginRequest'
      responses:
        '200':
          description: Development user session was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '403':
          description: Development login is disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested development user was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/logout:
    post:
      tags:
      - auth
      summary: Clear the development session cookie
      operationId: logout
      security: []
      responses:
        '204':
          description: Session cookie cleared.
  /api/sop/environments:
    get:
      tags:
      - sop
      summary: List configured SOP environments
      operationId: listSopEnvironments
      responses:
        '200':
          description: Configured public environments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnvironmentPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/sop/{sop_id}:
    get:
      tags:
      - sop
      summary: Preview a mocked SOP snapshot
      operationId: getSopPreview
      parameters:
      - $ref: '#/components/parameters/SopId'
      - $ref: '#/components/parameters/EnvironmentKey'
      responses:
        '200':
          description: Mocked SOP snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers:
    get:
      tags:
      - mcp
      summary: List MCP servers
      operationId: listMcpServers
      security:
      - CookieAuth: []
      responses:
        '200':
          description: MCP servers with redacted config values.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/McpServerSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
      - mcp
      summary: Create an MCP server configuration
      operationId: createMcpServer
      security:
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerCreate'
      responses:
        '201':
          description: Created MCP server with redacted config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDetail'
        '409':
          description: An MCP server with this name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}:
    get:
      tags:
      - mcp
      summary: Get MCP server details
      operationId: getMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: MCP server details and latest tool snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - mcp
      summary: Update an MCP server configuration
      operationId: updateMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerUpdate'
      responses:
        '200':
          description: Updated MCP server with redacted config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Running MCP servers must be stopped before config updates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - mcp
      summary: Delete an MCP server configuration
      operationId: deleteMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '204':
          description: MCP server deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/start:
    post:
      tags:
      - mcp
      summary: Start an MCP server
      operationId: startMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after start attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/stop:
    post:
      tags:
      - mcp
      summary: Stop an MCP server
      operationId: stopMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after stop attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/restart:
    post:
      tags:
      - mcp
      summary: Restart an MCP server
      operationId: restartMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after restart attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/mcp/servers/{server_id}/check:
    post:
      tags:
      - mcp
      summary: Check an MCP server and refresh tools
      operationId: checkMcpServer
      security:
      - CookieAuth: []
      parameters:
      - $ref: '#/components/parameters/McpServerId'
      responses:
        '200':
          description: Runtime status after check attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpLifecycleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/llm-providers:
    get:
      tags:
      - llm-providers
      summary: List LLM providers
      operationId: listLlmProviders
      responses:
        '200':
          description: LLM provider summaries with masked secret-like config values.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LlmProviderSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - llm-providers
      summary: Create an LLM provider
      operationId: createLlmProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderCreate'
      responses:
        '201':
          description: Created LLM provider with masked secret-like config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/llm-providers/{provider_id}:
    get:
      tags:
      - llm-providers
      summary: Get an LLM provider
      operationId: getLlmProvider
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      responses:
        '200':
          description: LLM provider detail with masked secret-like config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderDetail'
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - llm-providers
      summary: Update an LLM provider
      operationId: updateLlmProvider
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderUpdate'
      responses:
        '200':
          description: Updated LLM provider with masked secret-like config values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderDetail'
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - llm-providers
      summary: Delete an LLM provider
      operationId: deleteLlmProvider
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      responses:
        '204':
          description: LLM provider deleted.
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/llm-providers/{provider_id}/test:
    post:
      tags:
      - llm-providers
      summary: Test an LLM provider model
      operationId: testLlmProviderModel
      parameters:
      - $ref: '#/components/parameters/LlmProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderModelTestRequest'
      responses:
        '200':
          description: Provider model responded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderModelTestResponse'
        '400':
          description: Requested model is not configured for this provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: LLM provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Provider model connectivity test failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderModelTestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents:
    get:
      tags:
      - agents
      summary: List ReAct agents
      operationId: listAgents
      parameters:
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Agent summaries, newest first according to repository ordering.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - agents
      summary: Create a ReAct agent draft
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreate'
      responses:
        '201':
          description: Agent created with its initial draft configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/capabilities:
    get:
      tags:
      - agents
      summary: List Agent draft capabilities
      operationId: getAgentCapabilities
      description: |
        Returns the built-in tools and MCP servers an Agent draft may reference.
      responses:
        '200':
          description: Capability inventory for Agent drafts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCapabilities'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}:
    get:
      tags:
      - agents
      summary: Get a ReAct agent
      operationId: getAgent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent detail including the current draft, when present.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - agents
      summary: Delete a ReAct agent
      operationId: deleteAgent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '204':
          description: Agent deleted.
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/draft:
    patch:
      tags:
      - agents
      summary: Update a ReAct agent draft
      operationId: updateAgentDraft
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentDraftUpdate'
      responses:
        '200':
          description: Updated agent detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/sessions:
    post:
      tags:
      - agents
      summary: Start an Agent draft chat session
      operationId: startAgentSession
      description: |
        Append a user message to a draft chat session and trigger a draft run.
        Pass session_id=null to start a new session, or an existing id to continue.
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSessionStart'
      responses:
        '202':
          description: Session created or extended; the run continues asynchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionStartResponse'
        '409':
          description: The session already has an active Agent run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Agent draft is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/publish:
    post:
      tags:
      - agents
      summary: Publish a ReAct agent draft
      operationId: publishAgent
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '201':
          description: Published agent version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionDetail'
        '400':
          description: Agent draft is invalid and cannot be published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/versions:
    get:
      tags:
      - agents
      summary: List published ReAct agent versions
      operationId: listAgentVersions
      parameters:
      - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Published versions for the agent.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentVersionSummary'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/agents/{agent_id}/versions/{version_number}:
    get:
      tags:
      - agents
      summary: Get a published ReAct agent version
      operationId: getAgentVersion
      parameters:
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/AgentVersionNumber'
      responses:
        '200':
          description: Published agent version detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionDetail'
        '404':
          description: Agent or version not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/sop-quality-checks:
    post:
      tags:
      - sop-quality-checks
      summary: Start or join an active SOP quality check
      operationId: startSopQualityCheck
      parameters:
      - name: sop_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
        example: release-checklist
      - $ref: '#/components/parameters/EnvironmentKey'
      responses:
        '202':
          description: New check accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopQualityCheckStartResponse'
        '200':
          description: Existing active check joined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopQualityCheckStartResponse'
        '401': &id001
          $ref: '#/components/responses/Unauthorized'
        '422': &id002
          $ref: '#/components/responses/ValidationError'
    get:
      tags:
      - sop-quality-checks
      summary: List SOP quality check history
      operationId: listSopQualityChecks
      parameters:
      - name: sop_id
        in: query
        required: false
        schema:
          type: string
          minLength: 1
      - name: env
        in: query
        required: false
        schema:
          type: string
          minLength: 1
        example: dev
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: SOP quality check history, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SopQualityCheckSummary'
        '401': *id001
        '422': *id002
  /api/sop-quality-checks/{check_id}:
    get:
      tags:
      - sop-quality-checks
      summary: Get SOP quality check detail
      operationId: getSopQualityCheck
      parameters:
      - $ref: '#/components/parameters/CheckId'
      responses:
        '200':
          description: SOP quality check detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopQualityCheckDetail'
        '401': *id001
        '404': &id003
          $ref: '#/components/responses/NotFound'
        '422': *id002
  /api/sop-quality-checks/{check_id}/events:
    get:
      tags:
      - sop-quality-checks
      summary: Replay persisted SOP quality check events
      operationId: getSopQualityCheckEvents
      parameters:
      - $ref: '#/components/parameters/CheckId'
      - name: after
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: Lightweight persisted events after the requested sequence.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SopQualityCheckEvent'
        '401': *id001
        '404': *id003
        '422': *id002
  /api/sop-quality-checks/{check_id}/stream:
    get:
      tags:
      - sop-quality-checks
      summary: Stream SOP quality check lifecycle and live events
      description: 'Server-Sent Events stream. The server first replays persisted
        lightweight events after the requested sequence, then waits for live in-process
        events while the check is active. Persisted events do not include token payloads.

        '
      operationId: streamSopQualityCheck
      parameters:
      - $ref: '#/components/parameters/CheckId'
      - name: after
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: SSE stream of persisted lifecycle events and live in-process
            updates.
          content:
            text/event-stream:
              schema:
                type: string
        '401': *id001
        '404': *id003
        '422': *id002
  /api/sessions/{session_id}:
    get:
      tags:
      - sessions
      summary: Get session detail
      operationId: getSession
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Session detail with latest persisted message sequence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '401': *id001
        '404': *id003
        '422': *id002
  /api/sessions/{session_id}/messages:
    get:
      tags:
      - sessions
      summary: List persisted session messages after a cursor
      operationId: listSessionMessages
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: after
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
      responses:
        '200':
          description: Persisted messages after the requested sequence.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionMessage'
        '401': *id001
        '404': *id003
        '422': *id002
  /api/sessions/{session_id}/stream:
    get:
      tags:
      - sessions
      summary: Stream session messages and live deltas
      description: 'Server-Sent Events stream. Persisted message events advance the
        cursor; live token delta events do not. Terminal completed, failed, and
        interrupted events close the stream. Reconnect with the last persisted
        sequence to resume.

        '
      operationId: streamSession
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: after
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: SSE stream of persisted messages and live deltas.
          content:
            text/event-stream:
              schema:
                type: string
        '401': *id001
        '404': *id003
        '422': *id002
components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: cqa_user
  parameters:
    SopId:
      name: sop_id
      in: path
      required: true
      schema:
        type: string
      example: release-checklist
    McpServerId:
      name: server_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentKey:
      name: env
      in: query
      required: true
      schema:
        type: string
      example: dev
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentVersionNumber:
      name: version_number
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    LlmProviderId:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CheckId:
      name: check_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is required or the session cookie is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream dependency or lifecycle failure before completion.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user does not have admin access.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: MCP runtime is not configured or not enabled.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    UserPublic:
      type: object
      required:
      - id
      - account
      - is_admin
      - meta
      properties:
        id:
          type: string
          format: uuid
        account:
          type: string
          example: common
        is_admin:
          type: boolean
        meta:
          type: object
          additionalProperties: true
          default: {}
    DevLoginRequest:
      type: object
      required:
      - account
      properties:
        account:
          type: string
          example: common
    EnvironmentPublic:
      type: object
      required:
      - key
      - name_zh
      - name_en
      properties:
        key:
          type: string
          example: dev
        name_zh:
          type: string
          example: 开发
        name_en:
          type: string
          example: Development
    SopSnapshot:
      type: object
      required:
      - sop_id
      - env_key
      - payload
      properties:
        sop_id:
          type: string
        env_key:
          type: string
        source_version:
          type: string
          nullable: true
          example: mock-v1
        updated_at:
          type: string
          format: date-time
          nullable: true
        payload:
          type: object
          additionalProperties: true
    McpTransport:
      type: string
      enum:
      - stdio
      - http
    McpDesiredState:
      type: string
      enum:
      - running
      - stopped
    McpRuntimeStatus:
      type: string
      enum:
      - unknown
      - starting
      - running
      - stopping
      - stopped
      - error
    McpServerCreate:
      type: object
      required:
      - name
      - transport
      properties:
        name:
          type: string
          example: filesystem
        transport:
          $ref: '#/components/schemas/McpTransport'
        command:
          type: string
          nullable: true
          example: uvx
        args:
          type: array
          items:
            type: string
          default: []
          example:
          - mcp-server-filesystem
        env:
          type: object
          additionalProperties:
            type: string
          default: {}
          example:
            TOKEN: secret
        url:
          type: string
          nullable: true
          example: https://example.com/mcp
        headers:
          type: object
          additionalProperties:
            type: string
          default: {}
        enabled:
          type: boolean
          default: false
        desired_state:
          allOf:
          - $ref: '#/components/schemas/McpDesiredState'
          default: stopped
    McpServerUpdate:
      type: object
      properties:
        name:
          type: string
        command:
          type: string
          nullable: true
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        url:
          type: string
          nullable: true
        headers:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
        desired_state:
          $ref: '#/components/schemas/McpDesiredState'
    McpServerTool:
      type: object
      required:
      - name
      - input_schema
      properties:
        name:
          type: string
          example: search
        description:
          type: string
          nullable: true
        input_schema:
          type: object
          additionalProperties: true
          default: {}
        discovered_at:
          type: string
          format: date-time
          nullable: true
    McpServerSummary:
      type: object
      required:
      - id
      - name
      - transport
      - args
      - env
      - headers
      - enabled
      - desired_state
      - runtime_status
      - tool_count
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        transport:
          $ref: '#/components/schemas/McpTransport'
        command:
          type: string
          nullable: true
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
          example:
            TOKEN: '********'
        url:
          type: string
          nullable: true
        headers:
          type: object
          additionalProperties:
            type: string
          example:
            Authorization: '********'
        enabled:
          type: boolean
        desired_state:
          $ref: '#/components/schemas/McpDesiredState'
        runtime_status:
          $ref: '#/components/schemas/McpRuntimeStatus'
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true
        tool_count:
          type: integer
          minimum: 0
    McpServerDetail:
      allOf:
      - $ref: '#/components/schemas/McpServerSummary'
      - type: object
        required:
        - tools
        properties:
          tools:
            type: array
            items:
              $ref: '#/components/schemas/McpServerTool'
    McpLifecycleResponse:
      type: object
      required:
      - server_id
      - desired_state
      - runtime_status
      - tool_count
      properties:
        server_id:
          type: string
          format: uuid
        desired_state:
          $ref: '#/components/schemas/McpDesiredState'
        runtime_status:
          $ref: '#/components/schemas/McpRuntimeStatus'
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true
        tool_count:
          type: integer
          minimum: 0
    ErrorResponse:
