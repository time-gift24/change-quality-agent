components:
  schemas:
    AgentCreate:
      properties:
        display_name:
          type: string
          minLength: 1
          title: Display Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        draft:
          $ref: '#/components/schemas/AgentDraftConfig'
      type: object
      required:
      - display_name
      - draft
      title: AgentCreate
    AgentDetail:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        display_name:
          type: string
          title: Display Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        enabled:
          type: boolean
          title: Enabled
        has_draft:
          type: boolean
          title: Has Draft
        latest_version:
          anyOf:
          - $ref: '#/components/schemas/AgentVersionSummary'
          - type: 'null'
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        draft:
          anyOf:
          - $ref: '#/components/schemas/AgentDraftConfig'
          - type: 'null'
      type: object
      required:
      - id
      - display_name
      - enabled
      - has_draft
      - created_at
      - updated_at
      title: AgentDetail
    AgentDraftConfig:
      properties:
        system_prompt:
          type: string
          minLength: 1
          title: System Prompt
        model:
          type: string
          minLength: 1
          title: Model
        provider_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Provider Id
        model_config:
          additionalProperties: true
          type: object
          title: Model Config
        tool_allowlist:
          items:
            type: string
          type: array
          title: Tool Allowlist
        mcp_server_ids:
          items:
            type: string
          type: array
          title: Mcp Server Ids
      type: object
      required:
      - system_prompt
      - model
      title: AgentDraftConfig
    AgentDraftUpdate:
      properties:
        display_name:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Display Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enabled
        draft:
          anyOf:
          - $ref: '#/components/schemas/AgentDraftConfig'
          - type: 'null'
      type: object
      title: AgentDraftUpdate
    AgentSummary:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        display_name:
          type: string
          title: Display Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        enabled:
          type: boolean
          title: Enabled
        has_draft:
          type: boolean
          title: Has Draft
