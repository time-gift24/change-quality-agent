        quality_result:
          type: string
          nullable: true
        latest_sequence:
          type: integer
          minimum: 0
          default: 0
        created_at:
          type: string
          format: date-time
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        error_summary:
          type: string
          nullable: true
    SopQualityDisplayState:
      type: object
      required:
      - latest_sequence
      - nodes
      - is_running
      properties:
        latest_sequence:
          type: integer
          minimum: 0
          default: 0
        nodes:
          type: object
          additionalProperties: true
        is_running:
          type: boolean
          default: false
      additionalProperties: true
    SopQualityCheckDetail:
      allOf:
      - $ref: '#/components/schemas/SopQualityCheckSummary'
      - type: object
        required:
        - graph_name
        - graph_version
        - thread_id
        - checkpoint_ns
        - display_state
        properties:
          graph_name:
            type: string
          graph_version:
            type: string
          thread_id:
            type: string
          checkpoint_ns:
            type: string
          current_checkpoint_id:
            type: string
            nullable: true
          result:
